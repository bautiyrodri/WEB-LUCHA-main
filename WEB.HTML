<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100% LUCHA - Inicio</title>
    
    <link rel="stylesheet" type="text/css" href="PerezElRaton.css">
</head>
<div id="pantallaCarga">
    <div id="peleador1">😡</div>
    <div id="explosion"></div>
    <div id="peleador2">💪</div>

    <h2>¡PREPARANDO LA PELEA!</h2>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

    const menuBtn = document.getElementById("menuBtn");
    const nav = document.querySelector("nav");

    // El menú arranca oculto
    nav.style.display = "none";

    menuBtn.addEventListener("click", () => {

        if (nav.style.display === "none") {
            nav.style.display = "block";
        } else {
            nav.style.display = "none";
        }

    });

});
</script>
<body>

    <header>
        <img src="https://static.wikia.nocookie.net/lostmedia/images/9/9e/5481ade300ac6b5b512334362cfcd558b6fb5a95r1-500-574v2_uhq.jpg/revision/latest?cb=20201005205622&path-prefix=es" 
             alt="Imagen principal 100% Lucha" 
             class="hero-img" 
             width="600" />
             
        <h1>¡EL SHOW MÁS GRANDE DE LA LUCHA LIBRE!</h1>
    </header>
<button id="menuBtn">☰ MENÚ</button>
    <nav>
        <ul>
            <li><a href="historia.html" class="nav-btn">Historia</a></li>
            <li><a href="campeonato.html" class="nav-btn">Campeonato</a></li>
            <li><a href="luchadores.html" class="nav-btn">Luchadores</a></li>
            <li><a href="juego.html" class="nav-btn">Juego</a></li>
        </ul>
    </nav>

    <footer>
        <img src="https://thf.bing.com/th?id=OIF.YvVhsQPuAa6DbbV%2fa4fB0w&r=0&cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3" 
             alt="Imagen secundaria" 
             class="footer-img" 
             width="600" />
    </footer>
<script>

window.onload = function(){

    setTimeout(() => {

        document.getElementById("pantallaCarga").style.opacity = "0";

        setTimeout(() => {
            document.getElementById("pantallaCarga").style.display = "none";
        }, 1000);

    }, 3000);

};

</script>
</body>
</html>
